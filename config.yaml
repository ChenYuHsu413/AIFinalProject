# ---------------------------------------------------------------
# Predictive Maintenance Prototype – central configuration
# ---------------------------------------------------------------

paths:
  data_raw: data/raw/ai4i2020.csv
  data_processed_dir: data/processed
  outputs_figures: outputs/figures
  outputs_metrics: outputs/metrics
  outputs_models: outputs/models
  outputs_reports: outputs/reports
  best_model: outputs/models/best_model.joblib
  metrics_csv: outputs/metrics/model_comparison.csv
  best_model_meta: outputs/models/best_model_meta.json
  failure_type_model: outputs/models/failure_type_model.joblib
  failure_type_metrics: outputs/metrics/failure_type_comparison.csv
  tuning_history: outputs/metrics/tuning_history.csv
  tuned_params: outputs/models/tuned_params.json
  pretuned_model_backup: outputs/models/best_model_pretuned.joblib
  model_card: outputs/models/MODEL_CARD.md

# ---------------------------------------------------------------
# Columns
# ---------------------------------------------------------------
columns:
  id_columns: ["UDI", "Product ID"]
  categorical: ["Type"]
  numeric_raw:
    - "Air temperature [K]"
    - "Process temperature [K]"
    - "Rotational speed [rpm]"
    - "Torque [Nm]"
    - "Tool wear [min]"
  engineered:
    - "temp_diff"
    - "power_proxy"
    - "wear_torque_interaction"
    - "wear_speed_interaction"
    - "temp_wear_interaction"
  target_primary: "Machine failure"
  failure_types: ["TWF", "HDF", "PWF", "OSF", "RNF"]

# ---------------------------------------------------------------
# Train / test split
# ---------------------------------------------------------------
split:
  test_size: 0.2
  random_state: 42
  stratify: true

# ---------------------------------------------------------------
# Modeling
# ---------------------------------------------------------------
modeling:
  # Models to enable (XGBoost / LightGBM are skipped if not installed)
  enabled_models:
    - logistic_regression
    - decision_tree
    - random_forest
    - svm
    - gradient_boosting
    - xgboost
    - lightgbm
    - knn
    - mlp
    - naive_bayes
  class_weight: balanced            # only applied where the estimator supports it
  cv_folds: 5
  scoring_for_best: f1              # main criterion: F1 on the positive class
  random_state: 42

# ---------------------------------------------------------------
# Hyperparameter tuning (Optuna)
# ---------------------------------------------------------------
tuning:
  top_n_models: 3       # tune the top-N rows of model_comparison.csv (by scoring_for_best)
  n_trials: 15          # Optuna trials per model
  cv_folds: 3           # CV folds during tuning (3 is fast and stable for AI4I)
  timeout_per_model: 600  # seconds; soft cap to keep runtime reasonable

# Feature sets to compare during training
feature_sets:
  - name: A_baseline
    description: "Original raw features only (Type + 5 numeric)."
    method: raw
  - name: B_engineered
    description: "Raw + 5 engineered interaction / domain features."
    method: engineered
  - name: C_selectkbest_top8
    description: "SelectKBest (ANOVA F-test), top-8 features after engineering."
    method: selectkbest
    k: 8
  - name: D_rfe_top8
    description: "Recursive Feature Elimination with Logistic Regression, top-8."
    method: rfe
    k: 8
  - name: E_rf_importance_top8
    description: "Top-8 features by Random Forest impurity importance."
    method: rf_importance
    k: 8

# ---------------------------------------------------------------
# Module B — IMS bearing run-to-failure (dynamic health / RUL)
# Independent from the AI4I track above. See docs/MODULE_B_IMS_PLAN.md.
# ---------------------------------------------------------------
ims:
  # Folder of 984 timestamp-named ASCII snapshots from IMS Set 2 (Test 2).
  # Not committed to git — see data/README.md for the download instructions.
  raw_dir: data/raw/ims/2nd_test
  processed_features: data/processed/ims_set2_features.parquet
  rul_model: outputs/models/ims_rul.joblib
  rul_metrics: outputs/metrics/ims_rul.json
  rul_predictions: outputs/metrics/ims_rul_predictions.csv
  rul_test_frac: 0.3                 # last 30% of the run (by time) is the test fold
  alarm_health: 30.0                 # health below this raises a maintenance alarm
  # --- Trend-extrapolation RUL (the honest method for a single run-to-failure
  #     trajectory; tree regressors cannot extrapolate a monotone target). ---
  health_indicator: b1_rms           # feature used as the degradation indicator
  hi_smooth_window: 5                # rolling-median smoothing of the indicator
  baseline_n: 100                    # first N snapshots define the healthy baseline
  fpt_n_sigma: 3.0                   # onset = indicator > baseline_mean + n*std ...
  fpt_consecutive: 5                 # ... for this many consecutive snapshots
  fail_percentile: 99               # failure threshold = this percentile of the indicator
  min_fit_points: 5                  # min points after onset before extrapolating
  fit_window: 80                     # rolling window (snapshots) for the local exp fit
  near_failure_n: 100                # report a separate MAE over the last N snapshots
  sampling_rate_hz: 20000          # 20 kHz, 20480 samples (~1.024 s) per file
  n_bearings: 4                    # Set 2 has 1 channel per bearing
  target_bearing: 1                # B1 (column index 0) suffers the outer-race failure
  sliding_window: 10               # snapshots used for rolling mean / slope features
  # Rexnord ZA-2115 defect frequencies @ 2000 rpm (Hz). B1 = outer race -> BPFO.
  band_halfwidth_hz: 10.0
  defect_freqs:
    BPFO: 236.4
    BPFI: 296.9
    BSF: 139.9
    FTF: 14.8

# ---------------------------------------------------------------
# Risk thresholds & maintenance advice (used by predict / UI / API)
# ---------------------------------------------------------------
risk:
  low_max: 0.3
  medium_max: 0.7

# Operating-range thresholds for rule-based maintenance advice.
# Values are reasonable cut-offs derived from AI4I distribution percentiles.
advice_thresholds:
  high_temp_diff_K: 12.0
  high_torque_Nm: 55.0
  high_tool_wear_min: 200.0
  low_rotational_speed_rpm: 1300.0
