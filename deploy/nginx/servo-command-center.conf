# ---------------------------------------------------------------------------
# nginx reverse proxy — AI Servo Motor Health Command Center
#
#   /        -> Next.js (next start)  on 127.0.0.1:3000
#   /api/    -> FastAPI (uvicorn)     on 127.0.0.1:8000   (strips the /api prefix)
#
# Install on the VM:
#   sudo cp deploy/nginx/servo-command-center.conf /etc/nginx/sites-available/servo
#   sudo ln -s /etc/nginx/sites-available/servo /etc/nginx/sites-enabled/servo
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS: run `sudo certbot --nginx -d your.domain` afterwards — certbot rewrites
# this server block to add the 443 listener + certificate paths automatically.
# ---------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name _;            # replace with your domain, e.g. servo.example.com

    # Allow CSV batch uploads (module A 批次預測).
    client_max_body_size 16m;

    # ---- FastAPI backend ------------------------------------------------
    # The frontend is built with NEXT_PUBLIC_API_BASE_URL=/api, so all API
    # calls hit /api/*. The trailing slash on proxy_pass strips the /api prefix
    # (e.g. /api/servo/fleet -> http://127.0.0.1:8000/servo/fleet).
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;          # SHAP / training simulate can be slow
    }

    # ---- Next.js frontend ----------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;   # HMR / websockets
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
