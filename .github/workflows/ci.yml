name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: lint + tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (py_compile)
        # Cheap lint: every importable file must parse.
        run: python -m compileall -q src app tests scripts

      - name: Run pytest
        # All 9 tests use synthetic data and pure rule functions, so the
        # AI4I CSV is not required in CI.
        run: pytest -v --tb=short

  docker:
    name: docker build smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: pmm-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        # Confirm the image's Python can import the application packages.
        run: |
          docker run --rm pmm-app:ci python -c \
            "import importlib; [importlib.import_module(m) for m in ('src.models.predict','src.models.explain','src.models.train','app.backend.main')]; print('imports OK')"
