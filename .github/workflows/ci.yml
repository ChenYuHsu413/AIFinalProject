name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: lint + tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dl.txt

      - name: Install dependencies
        # requirements-dl.txt pulls in requirements-dev.txt (FastAPI backend +
        # pytest) and adds torch, so the offline DL test (test_servo_dl) runs.
        # The cloud / Docker image installs only requirements-dev.txt (no torch).
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dl.txt

      - name: Syntax check (py_compile)
        # Cheap lint: every importable file must parse.
        run: python -m compileall -q src app tests scripts

      - name: Run pytest
        # Tests use the committed processed features / metrics / model artifacts
        # plus synthetic data; the large RAW datasets (AI4I CSV, IMS/XJTU/Paderborn
        # raw) are not required — data-dependent tests adapt when they are absent.
        run: pytest -v --tb=short

  web:
    name: web (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Production build
        # NEXT_PUBLIC_API_BASE_URL is inlined at build time; prod uses /api
        # (nginx reverse-proxies /api -> uvicorn). See docs/DEPLOYMENT.md.
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: /api

  docker:
    name: docker build smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: pmm-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        # Confirm the image's Python can import the application packages.
        run: |
          docker run --rm pmm-app:ci python -c \
            "import importlib; [importlib.import_module(m) for m in ('src.models.predict','src.models.explain','src.models.train','app.backend.main')]; print('imports OK')"
