name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: lint + tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        # requirements-dev.txt pulls in requirements.txt via its leading -r and
        # adds the FastAPI backend + pytest (matches the Dockerfile install).
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Syntax check (py_compile)
        # Cheap lint: every importable file must parse.
        run: python -m compileall -q src app tests scripts

      - name: Run pytest
        # Tests use the committed processed features / metrics / model artifacts
        # plus synthetic data; the large RAW datasets (AI4I CSV, IMS/XJTU/Paderborn
        # raw) are not required — data-dependent tests adapt when they are absent.
        run: pytest -v --tb=short

  docker:
    name: docker build smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: pmm-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        # Confirm the image's Python can import the application packages.
        run: |
          docker run --rm pmm-app:ci python -c \
            "import importlib; [importlib.import_module(m) for m in ('src.models.predict','src.models.explain','src.models.train','app.backend.main')]; print('imports OK')"
